## FIRST LINE/ROW: Info & Status
# First param в”Җв”Ң
[username]
format = " [в•ӯв”Җ$user]($style)@"
show_always = false
style_root = "bold yellow"
style_user = "bold yellow"

# Second param
[hostname]
disabled = true
format = "[$hostname]($style) in "
ssh_only = false
style = "bold dimmed red"
trim_at = "-"

# Third param
[directory]
style = "blue"
truncate_to_repo = true
truncation_length = 0
truncation_symbol = "repo: "

# Fourth param
[sudo]
disabled = false

# Before all the version info (python, nodejs, php, etc.)
[git_status]
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
deleted = "x"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
style = "white"

# Last param in the first line/row
[cmd_duration]
disabled = false
format = "took [$duration]($style)"
min_time = 1


## SECOND LINE/ROW: Prompt
# Somethere at the beginning
# Prompt: optional param 1
[time]
disabled = true
format = " рҹ•ҷ $time($style)"
style = "bright-white"
time_format = "%T"

# Prompt: param 2
[character]
error_symbol = " [Г—](bold red)"
#success_symbol = " [> ](green)"

# SYMBOLS
[status]
disabled = false
format = '[\[$symbol$status_common_meaning$status_signal_name$status_maybe_int\]]($style)'
map_symbol = true
pipestatus = true
symbol = "рҹ”ҙ"

